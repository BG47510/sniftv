name: a02 frdocs

on:
  schedule:
    - cron: '20 1/4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Vérifier le code source
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Exécuter le script frdocs
      run: |
        python "${{ github.workspace }}/a02/frdocs.py"

    - name: Configurer Git (user)
      run: |
        git config user.name "BG47510"
        git config user.email "username@users.noreply.github.com"

    - name: Ajouter et committer les changements
      run: |
        git add a02/frdocs.m3u8 a02/bak/frdocs.bak || true
        git commit -m "Actualisation du token dans le frdocs.m3u8 et bak" || echo "Rien à committer"

    - name: Rebase local commits sur origin/main et pousser via branche temporaire
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e
        # Authentifier remote avec le token temporaire
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

        # Récupérer origin/main
        git fetch origin main --depth=1

        # Si on est déjà à jour et aucun commit local, on push directement
        if git rev-parse --verify origin/main >/dev/null 2>&1; then
          :
        fi

        # Créer une branche temporaire depuis HEAD
        git checkout -b tmp-action

        # Rebaser les commits locaux (s'il y en a) sur origin/main
        # Si rebase échoue (conflits), la commande échouera et la job s'arrêtera sans push
        git rebase origin/main

        # Si rebase réussi, pousser tmp-action vers main
        git push origin tmp-action:main

    # Option alternative risquée (forcer le push) — laisser commentée
    # - name: Push forcé (DANGER)
