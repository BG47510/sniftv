name: a02 frlcp

on:
  schedule:
    - cron: '* */5 * * *'  # S'exécute toutes les 5 heures
  workflow_dispatch:  # Permet de lancer le script manuellement depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest  # Utilisation d'une image Ubuntu

    steps:
    - name: Vérifier le code source
      uses: actions/checkout@v5

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'  # Version de Python à utiliser

    - name: Installer les dépendances
      run: |
        pip install requests  # Installer requests
        # Ajouter d'autres dépendances si nécessaire

    - name: Exécuter le script
      run: |
        python ${GITHUB_WORKSPACE}/a02/frlcp.py

    - name: Gestion des modifications apportées
      run: |
       git config user.name "BG47510"
       git config --global user.email "username@users.noreply.github.com"
       git remote set-url origin https://x-access-token:\${{ [blocked] secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
       git fetch origin main --depth=1
       git checkout main
       git reset --hard origin/main
       git add a02/frlcp.m3u8 a02/bak/frlcp.bak
       git commit -m "Actualisation du token dans le frlcp.m3u8 et bak" || echo "Rien à committer"
       git push origin main
